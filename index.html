<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LeadsBridge-UI</title>

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />

		<!-- Font Awesome for icons -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

		<!-- Custom CSS -->
		<link rel="stylesheet" href="style.css" />

		<!-- Tailwind CSS CDN -->
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: '#FFA500',
							dark: '#1A1A1A',
							bgLight: '#FFFFFF',
							bgDark: '#151515',
						},
						fontFamily: {
							sans: ['Oswald', 'sans-serif'],
							heading: ['Oswald', 'sans-serif'],
						},
						boxShadow: {
							brutal: '4px 4px 0px 0px rgba(0,0,0,1)',
							'brutal-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
						},
					},
				},
			};
		</script>
	</head>
	<body>
		<section class="min-h-screen bg-gradient-to-b from-white to-[#FFF0D4] overflow-x-hidden text-gray-900 font-sans relative">
			<!-- Navbar -->
			<nav class="container mx-auto px-6 py-6 flex items-center justify-between relative z-50">
				<!-- Logo -->
				<div class="flex items-center w-[32px] h-[32px]">
					<img src="public/Logo.svg" alt="Logo" class="w-full h-full" />
				</div>

				<div class="flex items-center gap-10">
					<!-- Links -->
					<div class="hidden md:flex items-center gap-10 text-[15px]">
						<a href="#" class="text-primary hover:text-orange-500 transition-colors">Services</a>
						<a href="#" class="text-gray-800 hover:text-primary transition-colors">About</a>
						<a href="#" class="text-gray-800 hover:text-primary transition-colors">Contact</a>
					</div>

					<!-- CTA Button -->
					<div class="hidden md:block">
						<a
							href="#"
							class="inline-block bg-primary rounded-full px-6 py-2.5 text-[15px] shadow-brutal hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-brutal-hover transition-all text-bgLight"
						>
							Book a Free Consultation
						</a>
					</div>

					<!-- Mobile Menu Button -->
					<button class="md:hidden text-2xl text-black">
						<i class="fa-solid fa-bars"></i>
					</button>
				</div>
			</nav>

			<!-- Main Content -->
			<main class="container mx-auto px-6 pt-24 pb-32 relative min-h-[80vh] flex flex-col justify-center items-center z-10">
				<!-- Hero Section -->
				<div class="max-w-4xl mx-auto flex flex-col items-center text-center relative z-20">
					<!-- Badge -->
					<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full">
						<div class="bg-primary text-white rounded w-[64px] h-[30px] flex items-center justify-center text-[25px]">
							<i class="fa-brands fa-amazon"></i>
						</div>
						<span class="text-[16px] text-bgDark">Your Full-Service <span class="text-primary">Amazon Partner</span></span>
					</div>

					<!-- Headline -->
					<h1 class="font-heading text-5xl md:text-[76px] font-extrabold leading-[1.05] tracking-tight mb-10 text-[#1a1a1a]">
						Turn Your Amazon Struggles<br />
						into Success—Save Time,<br />
						<span class="text-primary">Maximize Profits!</span>
					</h1>

					<!-- CTA -->
					<a
						href="#"
						class="inline-block bg-primary rounded-full px-6 py-2.5 text-[15px] shadow-brutal hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-brutal-hover transition-all text-bgLight text-lg"
					>
						Book a Free Consultation
					</a>
				</div>
			</main>
		</section>
		<script src="script.js"></script>
	</body>
</html>
